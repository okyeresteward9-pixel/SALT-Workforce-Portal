<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assign Task</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-6 border border-gray-200">
    <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Assign Task</h2>

    <form method="POST" class="space-y-5">

      <div>
        <label class="block text-gray-700 font-medium mb-1">Task Title</label>
        <input type="text" name="title" required
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400">
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-1">Description</label>
        <textarea name="description" rows="4"
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"></textarea>
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-1">Assign To</label>
        <select name="assigned_to"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400">
          {% for emp in employees %}
          <option value="{{ emp[0] }}">{{ emp[1] }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-1">Deadline</label>
        <input type="date" name="deadline"
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400">
      </div>

      <button type="submit"
              class="w-full py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition">
        Create Task
      </button>

    </form>
  </div>

</body>
</html>
